<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 115" width="100%" height="100%">
  <defs>
    <linearGradient id="brandBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#1D4ED8" />
    </linearGradient>
    
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.15" />
    </filter>
  </defs>

  <g transform="translate(5, 5)">
    <rect x="0" y="0" width="100" height="100" rx="24" fill="url(#brandBlue)" filter="url(#dropShadow)" />
    
    <rect x="20" y="20" width="50" height="60" rx="4" fill="#FFFFFF" opacity="0.3" transform="rotate(-15 45 50)" />
    
    <rect x="30" y="25" width="50" height="60" rx="4" fill="#FFFFFF" filter="url(#dropShadow)" />
    
    <rect x="35" y="30" width="40" height="40" rx="2" fill="url(#brandBlue)" opacity="0.05" />
    
    <circle cx="55" cy="52" r="12" fill="url(#brandBlue)" />
    <circle cx="55" cy="52" r="5" fill="#FFFFFF" />
    
    <circle cx="68" cy="38" r="3" fill="url(#brandBlue)" />
  </g>
</svg>
